# Канонический деплой SearXNG для лаборатории (воспроизводимость).
# Используется вместо standalone `docker run`, чтобы конфиг версионировался
# и контейнер авто-перезапускался.
#
# Миграция с текущего standalone-контейнера (имя `searxng`, порт 8889):
#   docker stop searxng && docker rm searxng
#   docker compose -f docker-compose.searxng.yml up -d
# settings.yml монтируется из ./searxng/settings.yml (версионирован в репо).
version: "3.8"

services:
  searxng:
    # Custom engines are baked into the image via Dockerfile.searxng so they
    # survive `docker compose up -d` / image pulls / host reboots.
    # `docker compose build` must run after adding/updating an engine module.
    build:
      context: .
      dockerfile: Dockerfile.searxng
    image: lab-searxng:local
    container_name: searxng
    env_file: .env.searxng
    ports:
      - "127.0.0.1:8889:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    healthcheck:
      # Preserves BOTH branch intents (merged 2026-07-16, Сова/ЗавЛаб):
      #  - main: probe a SPECIFIC working engine (yandex, no API key). Using
      #    `engines=yandex` (not `categories=general`) avoids being masked by
      #    wikipedia/wikidata answers that would hide a truly blind web search.
      #  - raven/search-memory-bridge: catch "silent blindness" — HTTP 200 may be
      #    returned with an empty results list (all general engines blocked/
      #    disabled). Require >0 results so a blind search flips UNHEALTHY.
      # The check probes BOTH yandex (targeted) and general (broad) and is
      # healthy if EITHER returns >0 results.
      test: ["CMD", "python3", "-c", "import json,sys,urllib.request; ok=lambda u: len(json.loads(urllib.request.urlopen(u,timeout=8).read()).get('results',[]))>0; sys.exit(0 if (ok('http://localhost:8080/search?q=health&format=json&engines=yandex') or ok('http://localhost:8080/search?q=health&format=json&categories=general')) else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
