# Канонический деплой SearXNG для лаборатории (воспроизводимость).
# Используется вместо standalone `docker run`, чтобы конфиг версионировался
# и контейнер авто-перезапускался.
#
# Миграция с текущего standalone-контейнера (имя `searxng`, порт 8889):
#   docker stop searxng && docker rm searxng
#   docker compose -f docker-compose.searxng.yml up -d
# settings.yml монтируется из ./searxng/settings.yml (версионирован в репо).
version: "3.8"

services:
  searxng:
    # Custom engines are baked into the image via Dockerfile.searxng so they
    # survive `docker compose up -d` / image pulls / host reboots.
    # `docker compose build` must run after adding/updating an engine module.
    build:
      context: .
      dockerfile: Dockerfile.searxng
    image: lab-searxng:local
    container_name: searxng
    env_file: .env.searxng
    ports:
      - "127.0.0.1:8889:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    healthcheck:
      # NOTE: the SearXNG image has no `curl`; use python3 (present in the image).
      # Catches "silent blindness": HTTP 200 may be returned with an empty
      # results list (e.g. all general engines blocked/disabled). Require >0
      # results so a blind general search flips the container to UNHEALTHY.
      test: ["CMD", "python3", "-c", "import urllib.request,json,sys; d=json.loads(urllib.request.urlopen('http://localhost:8080/search?q=health&format=json&categories=general', timeout=8).read()); sys.exit(0 if len(d.get('results',[]))>0 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
