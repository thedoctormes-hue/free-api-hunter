use_default_settings: true

search:
  formats:
    - html
    - csv
    - json
    - rss

server:
  port: 8080
  bind_address: "0.0.0.0"
  base_url: false
  image_proxy: true
  # Отключаем rate-limit: инстанс self-hosted, дёргает агент с localhost.
  # localhost уже в trusted_proxies (127.0.0.0/8) по умолчанию.
  limiter: false

botdetection:
  ip_limit:
    link_token: false
  ip_lists:
    pass_searxng_org: false

# ВНИМАНИЕ: при use_default_settings: true блок engines: МЕРЖИТСЯ с дефолтным
# списком движков (не заменяет его целиком). Дефолтные движки (duckduckgo,
# brave, google, bing, ...) остаются активны; наш блок ДОБАВЛЯЕТ/переопределяет
# перечисленные. Поэтому рядом с DDG держим keyless-фоллбэки (mojeek/wiby/
# marginalia/bing/startpage/seznam): если DDG в CAPTCHA (SearXNG issue #3927,
# SearxEngineCaptchaException, suspended_time может быть до 3600s), остальные
# всё равно выдают результат, и зависящая от SearXNG логика (/research verify)
# не падает в unverified. ВАЖНО: при бёрст-тестировании наш IP получает
# rate-limit сразу у нескольких движков -> временно 0 результатов. Это
# транзиент, проходит после cooldown; скил корректно возвращает
# searxng_unavailable (грейсфул-деградация), а не «сломан».
engines:
  - name: duckduckgo
    engine: duckduckgo
    categories: general
  - name: mojeek
    engine: mojeek
    categories: general
  - name: wiby
    engine: wiby
    categories: general
  - name: marginalia
    engine: marginalia
    categories: general
  - name: bing
    engine: bing
    categories: general
  - name: startpage
    engine: startpage
    categories: general
  - name: seznam
    engine: seznam
    categories: general
  - name: wikipedia
    engine: wikipedia
    categories: general
  - name: wikidata
    engine: wikidata
    categories: general
  # --- Premium API engines (Unified Search Gateway, free-tier keys) ---
  # Ключи подаются через env (EXA_API_KEY и т.д.) из .env.searxng.
  # Движок не загрузится, пока env не задан (SearXNG пропустит с warning).
  - name: exa
    engine: exa
    api_key: !env EXA_API_KEY
    categories: [general, web, ai]
  - name: serper
    engine: serper
    api_key: !env SERPER_API_KEY
    categories: [general, web]
  - name: serpapi
    engine: serpapi
    api_key: !env SERPAPI_API_KEY
    categories: [general, web]
  - name: olostep
    engine: olostep
    api_key: !env OLOSTEP_API_KEY
    categories: [general, web]
